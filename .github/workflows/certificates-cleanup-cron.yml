name: Certificates Cleanup Cron

on:
  schedule:
    # Run on the first day of every month at 04:00 AM UTC
    - cron: '0 4 1 * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  cleanup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Trigger Cleanup API
        env:
          APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$APP_URL" ]; then
            echo "Error: NEXT_PUBLIC_APP_URL variable is not set."
            exit 1
          fi
          if [ -z "$CRON_SECRET" ]; then
            echo "Error: CRON_SECRET secret is not set."
            exit 1
          fi
          # Remove trailing slash from APP_URL if exists
          CLEAN_URL=$(echo $APP_URL | sed 's:/*$::')
          
          # Clean and trim CRON_SECRET safely using printf to avoid shell expansion/option issues
          CLEAN_SECRET=$(printf "%s" "$CRON_SECRET" | tr -d '\r\n' | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//')
          
          curl -f -X POST "$CLEAN_URL/api/cron/cleanup-certificates" \
          -H "Authorization: Bearer $CLEAN_SECRET" \
          -H "Content-Type: application/json"
